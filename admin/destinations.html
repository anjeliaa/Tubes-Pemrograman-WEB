<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Destinations</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="sidebar-top">
      <h2>Admin Panel</h2>
      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i> Dashboard
          </a>
        </li>
        <li class="active">
          <a href="destinations.html">
            <i class="fa-solid fa-map"></i> Destinations
          </a>
        </li>
        <li>
          <a href="blogs.html">
            <i class="fa-solid fa-pen"></i> Blogs
          </a>
        </li>
        <li>
          <a href="users.html">
            <i class="fa-solid fa-users"></i> Users
          </a>
        </li>
        <li>
          <a href="accommodations.html"><i class="fa-solid fa-hotel"></i> Penginapan</a>
        </li>
      </ul>
    </div>

    <button id="logoutBtn" class="btn-logout">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </aside>

  <main class="admin-main">

    <div class="admin-header">
      <h1>Manage Destinations</h1>
      <p>Kelola data wisata dengan mudah</p>
    </div>

    <div class="admin-section">
      <h2>Tambah / Edit Wisata</h2>

      <form id="formWisata" class="admin-form">

        <input type="text" id="nama" placeholder="Nama Wisata" required>

        <div class="form-group-admin" style="width: 100%;">
          <input type="text" id="lokasi" list="existingLocations" placeholder="Ketik atau pilih lokasi..." required 
                 style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px;">
          <datalist id="existingLocations">
            </datalist>
        </div>

        <select id="kategori" required>
          <option value="">Pilih Kategori</option>
          <option value="pantai">Pantai</option>
          <option value="alam">Alam</option>
          <option value="sejarah">Sejarah</option>
        </select>

        <textarea id="deskripsi" placeholder="Deskripsi" required></textarea>

        <input type="file" id="image" accept="image/*" required>

        <img id="previewImg" alt="Preview Gambar">

        <button type="submit">Simpan</button>
      </form>
    </div>

    <div class="admin-section">
      <h2>Daftar Wisata</h2>
      <div id="destinationList" class="admin-list"></div>
    </div>

  </main>
</div>

<script src="admin.js"></script>
<!-- SweetAlert2 Library -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
